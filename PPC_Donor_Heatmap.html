*{margin:0;padding:0;box-sizing:border-box}
body{background:#111113;font-family:'IBM Plex Sans',system-ui,sans-serif;color:#e0e0e0}
#app{display:flex;flex-direction:column;height:100vh}

/* Collapsible header */
.hdr{padding:14px 20px;border-bottom:1px solid #2a2a2e;background:#111113;z-index:1000;transition:all .25s ease;overflow:hidden}
.hdr.collapsed{padding:8px 20px}
.hdr-top{display:flex;justify-content:space-between;align-items:center}
.hdr-top h1{font-size:18px;font-weight:700;color:#fff;letter-spacing:-.3px;margin:0}
.hdr-toggle{width:28px;height:28px;border-radius:6px;border:1px solid #333;background:#1c1c1e;color:#888;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit;transition:all .15s;flex-shrink:0}
.hdr-toggle:hover{border-color:#555;color:#ccc}
.hdr-body{transition:max-height .3s ease,opacity .2s ease,margin .3s ease;overflow:hidden}
.hdr.collapsed .hdr-body{max-height:0!important;opacity:0;margin-top:0!important}
.hdr p{font-size:12px;color:#888;margin:2px 0 0}
.cg{margin-top:8px}
.cg-label{font-size:10px;color:#666;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.ctrls{display:flex;gap:5px;flex-wrap:wrap}
.ctrls button{padding:5px 11px;font-size:11px;font-weight:600;font-family:inherit;border:1px solid #333;border-radius:5px;background:#1c1c1e;color:#999;cursor:pointer;transition:all .15s}
.ctrls button.on{border-color:#4da6ff;background:#1a3a5c;color:#4da6ff}
.ctrls button.ppc{border-color:#ff6b8a;background:#3a1520;color:#ff6b8a}
.ctrls button:hover{border-color:#555}
.stats{display:flex;gap:20px;margin-top:10px;flex-wrap:wrap}
.st{display:flex;align-items:baseline;gap:5px}
.st-v{font-size:16px;font-weight:700;font-family:'IBM Plex Mono',monospace}
.st-l{font-size:10px;color:#666;text-transform:uppercase;letter-spacing:.4px}

/* Collapsed state inline label */
.hdr-collapsed-label{display:none;font-size:12px;color:#888;margin-left:12px;font-weight:400}
.hdr.collapsed .hdr-collapsed-label{display:inline}

#map{flex:1;background:#1a1a1e}

.panel{background:rgba(17,17,19,.92);backdrop-filter:blur(8px);border:1px solid #2a2a2e;border-radius:8px;font-size:11px;color:#ccc;transition:all .2s ease}
.panel-header{display:flex;justify-content:space-between;align-items:center;cursor:pointer;padding:10px 14px;user-select:none}
.panel-header h4{font-size:12px;font-weight:700;color:#fff;margin:0}
.panel-toggle{width:22px;height:22px;border-radius:4px;border:1px solid #333;background:#1c1c1e;color:#888;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit;transition:all .15s;flex-shrink:0}
.panel-toggle:hover{border-color:#555;color:#ccc}
.panel-body{padding:0 14px 12px;line-height:1.6;overflow:hidden;transition:max-height .25s ease,padding .25s ease}
.panel.collapsed .panel-body{max-height:0!important;padding-top:0;padding-bottom:0}
.panel.collapsed .panel-header{padding-bottom:10px}

.legend{min-width:160px}
.gbar{width:100%;height:12px;border-radius:4px;margin:4px 0}
.glabels{display:flex;justify-content:space-between;font-size:10px;color:#888;font-family:'IBM Plex Mono',monospace}

.info{min-width:240px;max-height:50vh;overflow-y:auto}
.ir{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid #222}
.ir .l{color:#888;font-size:11px}
.ir .v{font-weight:600;font-family:'IBM Plex Mono',monospace;color:#e0e0e0;font-size:11px}

.leaflet-popup-content-wrapper{background:rgba(17,17,19,.95)!important;color:#e0e0e0!important;border:1px solid #333!important;border-radius:8px!important}
.leaflet-popup-tip{background:rgba(17,17,19,.95)!important;border:1px solid #333!important}
.leaflet-popup-content{margin:10px 14px!important;font-family:'IBM Plex Sans',sans-serif!important;font-size:12px!important}
.ppc-mk{background:#ff6b8a;border:3px solid #fff;border-radius:50%;width:16px;height:16px;box-shadow:0 0 12px rgba(255,107,138,.6)}
</style>
</head>

[-76.0361,41.4477],[-76.0458,41.4483],[-76.0468,41.4673],[-76.0535,41.468]]]}}]};
const LAYERS={
  irs_avg:{label:"Avg Charitable $/Return",key:"irs_avg",fmt:v=>v!=null?"$"+v.toLocaleString():"N/A",color:[77,166,255],group:"irs"},
  irs_contrib_k:{label:"Total Contributions ($K)",key:"irs_contrib_k",fmt:v=>v!=null?"$"+v.toLocaleString()+"K":"N/A",color:[77,204,138],group:"irs"},
  irs_returns:{label:"Itemizing Returns",key:"irs_returns",fmt:v=>v!=null?v.toLocaleString():"N/A",color:[240,160,64],group:"irs"},
  ppc_donors:{label:"Donor Count",key:"ppc_donors",fmt:v=>v.toLocaleString(),color:[255,107,138],group:"ppc"},
  ppc_last_fy:{label:"Last FY Revenue",key:"ppc_last_fy",fmt:v=>"$"+v.toLocaleString(),color:[192,132,252],group:"ppc"},
  ppc_this_fy:{label:"This FY Revenue",key:"ppc_this_fy",fmt:v=>"$"+v.toLocaleString(),color:[96,208,208],group:"ppc"},
  ppc_avg_gift:{label:"Avg Gift",key:"ppc_avg_gift",fmt:v=>"$"+v.toLocaleString(),color:[240,160,64],group:"ppc"},
};
let cur="ppc_donors";
let geoLayer=null,map,infoCtrl,legendCtrl;

// Compute opportunity ZIPs once
const oppZips = new Set(
  GEO.features
    .filter(f=>f.properties.irs_avg!=null&&f.properties.irs_avg>3000&&(f.properties.ppc_donors||0)<5)
    .sort((a,b)=>b.properties.irs_avg-a.properties.irs_avg)
    .slice(0,10)
    .map(f=>f.properties.zip)
);

function vals(k){return GEO.features.map(f=>f.properties[k]).filter(v=>v!=null&&v>0)}
function getStyle(v,mn,mx,rgb,zip){
  const isOpp = cur.startsWith('ppc_') && oppZips.has(zip);
  if(v==null||v<=0){
    return {
      fillColor:"rgba(40,40,44,0.5)",
      fillOpacity:1,
      color: isOpp ? "#D4A017" : "rgba(60,60,66,0.6)",
      weight: isOpp ? 2.5 : 1.2,
      opacity:1,
      dashArray: isOpp ? "6 3" : null
    };
  }
  const r=Math.min(Math.max((v-mn)/(mx-mn),0),1);
  return {
    fillColor:"rgba("+rgb[0]+","+rgb[1]+","+rgb[2]+","+(0.1+r*0.7)+")",
    fillOpacity:1,
    color: isOpp ? "#D4A017" : "rgba("+rgb[0]+","+rgb[1]+","+rgb[2]+","+(0.2+r*0.6)+")",
    weight: isOpp ? 2.5 : 1.2,
    opacity:1,
    dashArray: isOpp ? "6 3" : null
  };
}

function popup(p){
  const isOpp = oppZips.has(p.zip);
  let h='<div style="min-width:220px"><div style="font-weight:700;font-size:14px;color:#fff">'+p.zip+(p.name?' \u2014 '+p.name:'')+'</div>';
  if(p.county)h+='<div style="font-size:11px;color:#888;margin-bottom:8px">'+p.county+'</div>';
  h+='<div style="font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:#ff6b8a;font-weight:600;margin-bottom:4px">PPC Donor Data</div>';
  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:2px 12px;font-size:11px;margin-bottom:8px">';
  h+='<span style="color:#888">Donors</span><span style="font-family:IBM Plex Mono,monospace;font-weight:700;color:'+(p.ppc_donors>10?'#4dcc8a':p.ppc_donors>0?'#f0a040':'#666')+'">'+p.ppc_donors+'</span>';
  h+='<span style="color:#888">Last FY Revenue</span><span style="font-family:IBM Plex Mono,monospace">$'+(p.ppc_last_fy||0).toLocaleString()+'</span>';
  h+='<span style="color:#888">This FY Revenue</span><span style="font-family:IBM Plex Mono,monospace">$'+(p.ppc_this_fy||0).toLocaleString()+'</span>';
  h+='<span style="color:#888">Transactions (LFY)</span><span style="font-family:IBM Plex Mono,monospace">'+(p.ppc_txns||0)+'</span>';
  if(p.ppc_avg_gift>0)h+='<span style="color:#888">Avg Gift</span><span style="font-family:IBM Plex Mono,monospace">$'+p.ppc_avg_gift.toLocaleString()+'</span>';
  h+='</div>';
  h+='<div style="font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:#4da6ff;font-weight:600;margin-bottom:4px">IRS Charitable Giving (all filers)</div>';
  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:2px 12px;font-size:11px">';
  if(p.suppressed){h+='<span style="color:#888;grid-column:1/3">Data suppressed (too few filers)</span>';}
  else{
    if(p.irs_contrib_k!=null)h+='<span style="color:#888">Total Contributions</span><span style="font-family:IBM Plex Mono,monospace">$'+p.irs_contrib_k.toLocaleString()+'K</span>';
    if(p.irs_returns!=null)h+='<span style="color:#888">Itemizing Returns</span><span style="font-family:IBM Plex Mono,monospace">'+p.irs_returns.toLocaleString()+'</span>';
    if(p.irs_avg!=null)h+='<span style="color:#888">Avg per Return</span><span style="font-family:IBM Plex Mono,monospace;font-weight:700;color:#4da6ff">$'+p.irs_avg.toLocaleString()+'</span>';
    else if(p.irs_contrib_k!=null&&p.irs_returns==null)h+='<span style="color:#888">Avg per Return</span><span style="color:#666;font-size:10px">Returns needed</span>';
  }
  h+='</div>';
  if(isOpp)
    h+='<div style="margin-top:8px;padding:6px 8px;border-radius:4px;background:rgba(212,160,23,0.15);border:1px solid rgba(212,160,23,0.4);font-size:11px;color:#D4A017;font-weight:500">\u26A0 Opportunity ZIP — high giving capacity, low PPC penetration</div>';
  if((p.ppc_donors||0)>=20)
    h+='<div style="margin-top:8px;padding:6px 8px;border-radius:4px;background:rgba(77,204,138,0.15);border:1px solid rgba(77,204,138,0.3);font-size:11px;color:#4dcc8a;font-weight:500">\u2605 Stronghold ZIP</div>';
  return h+'</div>';
}

function updateStats(){
  const l=LAYERS[cur],vs=vals(l.key);
  if(!vs.length){document.getElementById('stats').innerHTML='';return;}
  const tot=vs.reduce((a,b)=>a+b,0),mx=Math.max(...vs),avg=Math.round(tot/vs.length);
  const items=[{l:"ZIPs with data",v:vs.length,c:"#e0e0e0"},{l:"Highest",v:l.fmt(mx),c:"#4dcc8a"},{l:"Average",v:l.fmt(avg),c:"#4da6ff"}];
  if(l.group==="ppc")items.push({l:"Total",v:l.fmt(Math.round(tot)),c:"#ff6b8a"});
  else items.push({l:"Suppressed",v:GEO.features.filter(f=>f.properties.suppressed&&f.properties[l.key]==null).length,c:"#ff6b8a"});
  document.getElementById('stats').innerHTML=items.map(s=>'<div class="st"><span class="st-v" style="color:'+s.c+'">'+s.v+'</span><span class="st-l">'+s.l+'</span></div>').join('');
  // Update collapsed label
  document.getElementById('collapsed-label').textContent='\u2014 '+LAYERS[cur].label;
}

function updateInfo(){
  const l=LAYERS[cur];
  const ranked=GEO.features.filter(f=>{const v=f.properties[l.key];return v!=null&&v>0;}).sort((a,b)=>b.properties[l.key]-a.properties[l.key]).slice(0,10);
  const container=infoCtrl.getContainer();
  const body=container.querySelector('.panel-body');
  let h='';
  ranked.forEach((f,i)=>{
    const p=f.properties,nm=(p.name||p.zip).split('/')[0].split('(')[0].trim();
    const isOpp=oppZips.has(p.zip);
    h+='<div class="ir"><span class="l">'+(i+1)+'. '+p.zip+' '+nm+(isOpp?' \u26A0':'')+'</span><span class="v">'+l.fmt(p[l.key])+'</span></div>';
  });
  h+='<div style="margin-top:8px;font-size:10px;color:#555;border-top:1px solid #222;padding-top:6px"><span style="color:#ff6b8a">\u25CF</span> PPC &nbsp; <span style="color:#D4A017">\u25A0</span> Opportunity &nbsp; <span style="color:rgba(60,60,66)">\u25A0</span> No data</div>';
  body.innerHTML=h;
  container.querySelector('.panel-header h4').style.color='rgb('+l.color.join(',')+')';
  container.querySelector('.panel-header h4').textContent='Top 10: '+l.label;
}

function updateLegend(){
  const l=LAYERS[cur],vs=vals(l.key);
  const mn=vs.length?Math.min(...vs):0,mx=vs.length?Math.max(...vs):1;
  const container=legendCtrl.getContainer();
  const body=container.querySelector('.panel-body');
  const rgb=l.color.join(',');
  container.querySelector('.panel-header h4').textContent=l.label;
  container.querySelector('.panel-header h4').style.color='rgb('+rgb+')';
  let h='<div class="gbar" style="background:linear-gradient(to right,rgba('+rgb+',0.1),rgba('+rgb+',0.8))"></div>'
    +'<div class="glabels"><span>'+(vs.length?l.fmt(mn):'\u2014')+'</span><span>'+(vs.length?l.fmt(mx):'\u2014')+'</span></div>'
    +'<div style="margin-top:8px;display:flex;flex-direction:column;gap:4px">'
    +'<div style="display:flex;align-items:center;gap:6px"><div style="width:14px;height:14px;border-radius:3px;background:rgba(40,40,44,.5);border:1px solid rgba(60,60,66,.6)"></div><span>No data</span></div>';
  if(cur.startsWith('ppc_'))
    h+='<div style="display:flex;align-items:center;gap:6px"><div style="width:14px;height:14px;border-radius:3px;background:rgba(40,40,44,.3);border:2px dashed #D4A017"></div><span style="color:#D4A017">Opportunity ZIP</span></div>';
  h+='</div><div style="margin-top:6px;font-size:10px;color:#555">152 ZIPs \u00b7 6 counties</div>';
  body.innerHTML=h;
}

function render(){
  if(geoLayer)map.removeLayer(geoLayer);
  const l=LAYERS[cur],vs=vals(l.key);
  const mn=vs.length?Math.min(...vs):0,mx=vs.length?Math.max(...vs):1;
  geoLayer=L.geoJSON(GEO,{
    style:f=>getStyle(f.properties[l.key],mn,mx,l.color,f.properties.zip),
    onEachFeature:(f,ly)=>{
      ly.bindPopup(popup(f.properties),{maxWidth:320});
      const zip=f.properties.zip;
      ly.on('mouseover',function(){
        const isOpp=cur.startsWith('ppc_')&&oppZips.has(zip);
        this.setStyle({weight:isOpp?3.5:2.5,color:isOpp?'#FFD700':'#fff'});
        this.bringToFront();
      });
      ly.on('mouseout',function(){geoLayer.resetStyle(this);});
    }
  }).addTo(map);
  updateLegend();updateInfo();updateStats();
  document.querySelectorAll('.ctrls button').forEach(b=>b.className=b.dataset.key===cur?(LAYERS[cur].group==='ppc'?'ppc':'on'):'');
}

function createPanel(position,id,title){
  const ctrl=L.control({position:position});
  ctrl.onAdd=function(){
    const div=L.DomUtil.create('div','panel '+id);
    div.innerHTML='<div class="panel-header"><h4>'+title+'</h4><button class="panel-toggle" title="Collapse">\u2013</button></div><div class="panel-body"></div>';
    L.DomEvent.disableClickPropagation(div);
    L.DomEvent.disableScrollPropagation(div);
    div.querySelector('.panel-header').addEventListener('click',function(){
      const c=div.classList.toggle('collapsed');
      div.querySelector('.panel-toggle').textContent=c?'+':'\u2013';
    });
    return div;
  };
  ctrl.addTo(map);
  return ctrl;
}

document.addEventListener('DOMContentLoaded',function(){
  // Header collapse
  const hdr=document.getElementById('hdr');
  const hdrToggle=document.getElementById('hdr-toggle');
  hdrToggle.addEventListener('click',function(){
    const c=hdr.classList.toggle('collapsed');
    hdrToggle.innerHTML=c?'&#x2304;':'&#x2303;';
    hdrToggle.title=c?'Expand controls':'Collapse controls';
    // Invalidate map size after transition
    setTimeout(()=>map.invalidateSize(),350);
  });

  const iE=document.getElementById('irs-ctrls'),pE=document.getElementById('ppc-ctrls');
  Object.entries(LAYERS).forEach(([k,l])=>{
    const b=document.createElement('button');b.textContent=l.label;b.dataset.key=k;
    b.onclick=()=>{cur=k;render();};
    (l.group==='irs'?iE:pE).appendChild(b);
  });
  map=L.map('map',{center:[41.3,-75.7],zoom:9,zoomControl:true});
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{attribution:'\u00a9 OpenStreetMap \u00a9 CARTO',subdomains:'abcd',maxZoom:19}).addTo(map);
  L.marker([41.4295,-75.6649],{icon:L.divIcon({className:'ppc-mk',iconSize:[16,16],iconAnchor:[8,8]}),zIndexOffset:1000}).addTo(map).bindPopup('<div style="text-align:center"><div style="font-weight:700;font-size:13px;color:#ff6b8a">Providence Pregnancy Center</div><div style="font-size:11px;color:#888;margin-top:2px">1660 N. Main Ave, Scranton 18508</div></div>');
  legendCtrl=createPanel('bottomleft','legend','Legend');
  infoCtrl=createPanel('topright','info','Top 10');
  render();
});
</script>
</body>
</html>
