<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BUAN 587 — CRM Exam Flashcards</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0c0c0e;font-family:'DM Sans',system-ui,sans-serif;color:#e0e0e0;min-height:100vh;display:flex;flex-direction:column;overflow:hidden}

.app{display:flex;flex-direction:column;height:100vh;max-width:800px;margin:0 auto;width:100%;padding:16px}

/* Header */
.top{display:flex;justify-content:space-between;align-items:center;padding-bottom:12px;flex-shrink:0}
.top h1{font-size:16px;font-weight:700;color:#fff;letter-spacing:-.3px}
.top-right{display:flex;align-items:center;gap:10px}
.counter{font-size:13px;color:#888;font-family:'JetBrains Mono',monospace}
.shuffle-btn{width:32px;height:32px;border-radius:6px;border:1px solid #2a2a2e;background:#1c1c1e;color:#888;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.shuffle-btn:hover{border-color:#555;color:#ccc}

/* Category pills */
.cats{display:flex;gap:5px;flex-wrap:wrap;padding-bottom:12px;flex-shrink:0}
.cat-pill{padding:4px 10px;font-size:11px;font-weight:600;font-family:'DM Sans',sans-serif;border:1px solid #2a2a2e;border-radius:20px;background:transparent;color:#888;cursor:pointer;transition:all .15s}
.cat-pill:hover{border-color:#555}
.cat-pill.on{border-color:var(--cat-color);color:var(--cat-color);background:var(--cat-bg)}

/* Progress bar */
.progress{height:3px;background:#1c1c1e;border-radius:2px;margin-bottom:16px;flex-shrink:0;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;background:#4da6ff;transition:width .3s ease}

/* Card area */
.card-wrap{flex:1;perspective:1200px;cursor:pointer;min-height:0;display:flex;align-items:center;justify-content:center}
.card{width:100%;max-height:100%;position:relative;transition:transform .5s ease;transform-style:preserve-3d}
.card.flipped{transform:rotateY(180deg)}
.card-face{border-radius:16px;border:1px solid #2a2a2e;padding:28px 32px;display:flex;flex-direction:column;backface-visibility:hidden;overflow-y:auto}
.card-front{background:linear-gradient(135deg,#141418 0%,#1a1a20 100%);min-height:200px}
.card-back{background:linear-gradient(135deg,#0f1a14 0%,#141a1e 100%);position:absolute;top:0;left:0;width:100%;height:100%;transform:rotateY(180deg)}
.card-cat{font-size:10px;text-transform:uppercase;letter-spacing:.6px;font-weight:700;margin-bottom:12px}
.card-q{font-size:17px;font-weight:600;color:#fff;line-height:1.5;margin-bottom:12px}
.card-hint{font-size:12px;color:#555;margin-top:auto;padding-top:12px}
.card-label{font-size:10px;text-transform:uppercase;letter-spacing:.5px;font-weight:700;color:#4dcc8a;margin-bottom:10px}
.key-points{list-style:none;padding:0}
.key-points li{font-size:13px;color:#ccc;padding:6px 0;border-bottom:1px solid #1a2a20;line-height:1.5;display:flex;gap:8px}
.key-points li:last-child{border-bottom:none}
.kp-bullet{color:#4dcc8a;font-weight:700;flex-shrink:0;font-size:12px;margin-top:1px}
.kp-text{}

/* Nav */
.nav{display:flex;justify-content:space-between;align-items:center;padding-top:12px;flex-shrink:0;gap:8px}
.nav-btn{height:40px;padding:0 20px;border-radius:8px;border:1px solid #2a2a2e;background:#1c1c1e;color:#ccc;font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px}
.nav-btn:hover{border-color:#555;background:#222}
.nav-btn:disabled{opacity:.3;cursor:default}
.nav-btn:disabled:hover{border-color:#2a2a2e;background:#1c1c1e}
.nav-center{display:flex;gap:4px;overflow:hidden;justify-content:center;flex-wrap:wrap}
.dot{width:8px;height:8px;border-radius:50%;background:#2a2a2e;cursor:pointer;transition:all .15s;flex-shrink:0}
.dot.active{background:#4da6ff;transform:scale(1.3)}
.dot.done{background:#4dcc8a}

/* Keyboard hint */
.kbd{font-size:11px;color:#444;text-align:center;padding-top:8px;flex-shrink:0}
kbd{background:#1c1c1e;border:1px solid #2a2a2e;border-radius:3px;padding:1px 5px;font-family:'JetBrains Mono',monospace;font-size:10px;color:#666}

@media(max-width:600px){
  .app{padding:12px}
  .card-face{padding:20px}
  .card-q{font-size:15px}
  .key-points li{font-size:12px}
  .kbd{display:none}
  .cats{gap:4px}
}
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
const CARDS=[
  {cat:"CRM & Data Integration",color:"#4da6ff",q:"PPC processes donations through both Wix/Square and Bloomerang. Explain why this creates a data silo problem, which CRM capabilities are lost, and recommend a solution.",
   pts:["Data silo: same donor appears as two unrelated records across systems \u2014 no unified constituent profile","Lost capabilities: lifetime value tracking, donor journey attribution, automated stewardship sequences, engagement scoring","Bloomerang can't trigger a thank-you sequence for a Square ticket buyer because it doesn't know they exist","Solution: embed Bloomerang donation forms on Wix, replacing Square checkout for donations \u2014 every digital gift auto-creates a constituent record","For offline/event gifts: establish a 48-hour data entry protocol so cash and check donations are logged into Bloomerang with source codes","Key insight: CRM value comes from unified records, not just contact storage"]},

  {cat:"CRM & Data Integration",color:"#4da6ff",q:"A supporter buys a $75 dinner ticket via Square in March and makes a $100 online gift via Bloomerang in September. Describe what the org sees in each system vs. a properly integrated CRM.",
   pts:["Square sees: one $75 transaction, customer name, card info \u2014 no donor history","Bloomerang sees: one $100 gift, new constituent record \u2014 no event attendance history","Integrated CRM sees: one person, $175 total giving, event-to-donor conversion, 6-month engagement arc","With unified data: can calculate event ROI, identify which attendees convert to donors, trigger post-event stewardship","Without it: the dinner attendee who gave $100 online looks like a first-time donor and gets a generic welcome instead of a \u201Cthanks for your continued support\u201D","This is the exact problem Jessica described as the Wix\u2013Bloomerang disconnect"]},

  {cat:"Donor Segmentation & Retention",color:"#ff6b8a",q:"Define LYBUNT and SYBUNT. Why do these cohorts matter more for a small nonprofit than raw acquisition numbers? Design a 3-touch re-engagement sequence.",
   pts:["LYBUNT = Last Year But Unfortunately Not This year (gave 13\u201324 months ago, lapsed)","SYBUNT = Some Year But Unfortunately Not This year (gave 25+ months ago, deeply lapsed)","Why they matter: acquiring a new donor costs 5\u201310x more than retaining one \u2014 small nonprofits can't afford the acquisition treadmill","Touch 1 (Day 0): personal email from Jessica referencing their last gift and a specific impact it made","Touch 2 (Day 14): impact story or photo from Casa de Maria \u2014 emotional, not transactional","Touch 3 (Day 30): direct ask with a specific amount anchored to their previous gift, easy one-click recurring option","All three can be automated in Bloomerang's Journey Automation \u2014 zero staff time after setup"]},

  {cat:"Donor Segmentation & Retention",color:"#ff6b8a",q:"RFM analysis reveals 60% of revenue comes from donors who gave exactly once in the past 12 months at $250+ avg. What does this tell you and what CRM strategy addresses it?",
   pts:["Diagnosis: high Monetary, low Frequency = fragile revenue base","Risk: losing even a few of these donors creates a major budget shortfall \u2014 no recurring base to absorb it","These are likely event donors (Annual Dinner tickets/sponsorships) who gave once and weren't stewarded","Strategy 1: automated post-gift stewardship journey \u2014 thank, update, ask for monthly conversion at 60 days","Strategy 2: mid-level donor program \u2014 donors at $250+ get personal outreach from Jessica, not just automated emails","Strategy 3: recurring giving push \u2014 convert $250 one-time to $25/month ($300/year) which is actually higher and far more stable","Bloomerang's engagement meter flags these donors as \u201Cat risk\u201D when recency drops"]},

  {cat:"KPI Design & Measurement",color:"#f0a040",q:"Explain the difference between a vanity metric and an actionable KPI. Provide one example of each in the context of a pregnancy resource center's donor management.",
   pts:["Vanity metric: looks impressive but doesn't drive decisions \u2014 fails the \u201Cso what?\u201D test","Example vanity: website page views \u2014 10,000 visits means nothing if nobody donates or contacts PPC","Actionable KPI: directly tied to a decision or behavior change","Example actionable: website-to-donation conversion rate \u2014 tells you if the digital presence is generating revenue","If conversion rate drops, you know to investigate the donation form, page load speed, or CTA placement","Another vanity vs. actionable pair: Facebook followers (vanity) vs. Facebook-referred donations (actionable)","The KPI framework structure (Objective \u2192 Goal \u2192 KPI \u2192 Target \u2192 Data Source) forces actionability by requiring a target and measurement source"]},

  {cat:"KPI Design & Measurement",color:"#f0a040",q:"Design a KPI framework (Objective \u2192 Goal \u2192 KPI \u2192 Target \u2192 Data Source) for a nonprofit with both a residential program and community outreach. Include one cross-system KPI.",
   pts:["Residential: Objective=maximize housing impact \u2192 Goal=optimize occupancy \u2192 KPI=avg occupancy rate \u2192 Target=75% \u2192 Source=intake records","Outreach: Objective=serve more mothers \u2192 Goal=increase material assistance reach \u2192 KPI=clients served/month \u2192 Target=establish baseline \u2192 Source=client records","Cross-system KPI: donor-to-client ratio \u2014 needs Bloomerang donor count + PPC intake client count","This matters because it shows whether donor growth is keeping pace with service demand","Another cross-system example: cost-per-outcome \u2014 needs budget data + Bloomerang revenue + client outcome records","The framework forces you to identify data gaps: if a KPI has no data source, that gap itself is a finding"]},

  {cat:"Business Model Canvas",color:"#c084fc",q:"Why does PPC have dual customer segments? How does this complicate CRM strategy compared to a for-profit?",
   pts:["Two segments: clients (mothers served) and donors/supporters \u2014 completely different value propositions","Client value prop: free, confidential pregnancy support and housing","Donor value prop: tangible local impact, tax-deductible giving, faith-aligned mission","Complication: Bloomerang is designed for donors only \u2014 no native case management for client tracking","For-profit CRM tracks one customer journey: prospect \u2192 buyer \u2192 repeat buyer","Nonprofit needs two: donor journey (prospect \u2192 first gift \u2192 retention) AND client journey (intake \u2192 services \u2192 outcomes)","Solution: use Bloomerang for donors, lightweight system (structured Google Sheet or intake template) for clients, with summary outcome metrics feeding into donor communications"]},

  {cat:"Business Model Canvas",color:"#c084fc",q:"PPC's Annual Dinner generates 50\u201360% of annual revenue. Using the BMC, identify which blocks this concentration affects and propose two structural changes.",
   pts:["Affected blocks: Revenue Streams (concentration risk), Customer Relationships (event-dependent), Cost Structure (event costs consume margin)","Also affects Channels \u2014 if the dinner is the primary donor acquisition channel, every other channel is underdeveloped","Change 1: monthly recurring giving program via Bloomerang Journey Automation \u2014 convert 10% of dinner attendees to $25/month sustainers","This smooths cash flow and reduces dependency on a single annual event","Change 2: mid-year digital campaign targeting dinner-only donors with an impact update and ask","Both are implementable within Bloomerang without additional tools or staff time","Key insight: event dependency creates cash flow volatility that makes budgeting and program planning unreliable"]},

  {cat:"Geographic Analysis",color:"#60d0d0",q:"You have IRS SOI data (avg charitable deductions/return by ZIP) and a nonprofit's donor list by ZIP. Describe a methodology for identifying 'opportunity ZIPs.' What are the limitations?",
   pts:["Methodology: overlay IRS giving capacity by ZIP against actual donor density from CRM export","Opportunity ZIP = high IRS avg/return (>$3,000) but low or zero donors from the nonprofit","Rank by gap between potential and actual penetration","Can visualize with a GeoJSON polygon heatmap using Census ZCTA shapefiles + Leaflet.js","Limitation 1: IRS data only captures itemized deductions \u2014 roughly 10% of filers post-2017 TCJA","Limitation 2: doesn't distinguish between religious, educational, and human-services giving","Limitation 3: ZCTA boundaries don't perfectly align with USPS ZIP codes \u2014 small ZIPs may be absorbed into neighbors","Limitation 4: high avg/return could reflect a few wealthy outliers, not broad giving behavior"]},

  {cat:"Geographic Analysis",color:"#60d0d0",q:"A heatmap shows highest-revenue ZIPs are within 5 miles of the office, while ZIPs 15\u201320 miles away show higher avg charitable giving but zero donors. What does this tell you?",
   pts:["Diagnosis: the nonprofit is using proximity-based acquisition channels (walk-ins, parish bulletins, local events, word of mouth)","They're fishing where they are, not where the fish are","The outer-ring ZIPs represent untapped donor capacity that requires different channels to reach","Recommendation 1: targeted Facebook/Instagram ad campaigns geo-fenced to those high-capacity ZIPs","Recommendation 2: identify parishes in those ZIPs and request bulletin insert or pulpit announcement","Recommendation 3: direct mail campaign using IRS data to prioritize ZIP codes by giving capacity","Recommendation 4: add UTM parameters to each campaign to track which channel generates donors from those ZIPs"]},

  {cat:"Web Analytics & Attribution",color:"#1D9E75",q:"Explain UTM parameters. A nonprofit runs a Facebook ad, email appeal, and parish bulletin insert all driving to the same donation page. What does the CRM see with and without UTMs?",
   pts:["UTM = Urchin Tracking Module \u2014 tags appended to URLs that identify source, medium, and campaign","Without UTMs: all three channels show as 'direct' or 'none' in GA4 \u2014 impossible to calculate channel ROI","With UTMs: each link is tagged (e.g., utm_source=facebook&utm_medium=ad&utm_campaign=spring2026)","GA4 then attributes each session and conversion to the correct channel","With attribution: can calculate cost-per-acquisition by channel \u2014 if the Facebook ad cost $200 and generated 5 donors, CPA = $40","Can also compare: email generated 12 donors at $0 cost vs. Facebook generated 5 at $40 each","This directly informs budget allocation: stop spending on low-ROI channels, double down on high-ROI ones"]},

  {cat:"Applied Scenario",color:"#D85A30",q:"You're consulting for a small faith-based nonprofit with 2 FTE staff, 400 donors, Wix website, and Bloomerang CRM. Recommend 3 changes for highest donor retention impact within 90 days. Must account for limited staff.",
   pts:["Key constraint: 2 staff means every recommendation must be automatable, not labor-intensive","Change 1: automated 48-hour thank-you emails via Bloomerang Journey Automation \u2192 metric: acknowledgment rate","Research shows donors thanked within 48 hours are 4x more likely to give again","Change 2: monthly email newsletter via Bloomerang's email builder \u2192 metric: open rate + re-gift rate within 30 days of send","Keeps PPC top-of-mind between events, costs zero staff time after template creation","Change 3: embed Bloomerang donation forms on Wix replacing Square checkout \u2192 metric: source-attributed conversion rate","Closes the data silo, enables attribution, and triggers automated stewardship for every online donor","All three are set-and-forget after initial setup \u2014 Jessica doesn't need to touch them daily"]},

  {cat:"Applied Scenario",color:"#D85A30",q:"Under what circumstances would you advise a small nonprofit NOT to invest in a CRM? When are spreadsheets the better choice?",
   pts:["This is the curveball \u2014 tests whether you can think critically about the tool you spent 3 weeks using","Spreadsheets may be better if: fewer than 100 donors and no growth trajectory","If all giving comes through a single channel (e.g., one annual church collection) with no segmentation needed","If annual budget is under $50K and $1,500/year CRM cost represents >3% of revenue","If no staff member has capacity to learn or maintain the system \u2014 an unused CRM is worse than a spreadsheet","If the org relies entirely on in-kind donations and volunteer labor with no cash fundraising","The breakeven question: will the CRM help retain enough additional donors to pay for itself? If the math doesn't work, don't buy it","Key insight: a CRM is a tool, not a strategy \u2014 without someone to use it, it's an expensive address book"]},
];

const CATS=[...new Set(CARDS.map(c=>c.cat))];
const catColors={};
CARDS.forEach(c=>{catColors[c.cat]=c.color;});

let deck=[...Array(CARDS.length).keys()];
let pos=0;
let flipped=false;
let seen=new Set();
let activeCats=new Set(CATS);

function filterDeck(){
  deck=[...Array(CARDS.length).keys()].filter(i=>activeCats.has(CARDS[i].cat));
  pos=0;flipped=false;seen.clear();
  render();
}

function shuffle(){
  for(let i=deck.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[deck[i],deck[j]]=[deck[j],deck[i]];}
  pos=0;flipped=false;seen.clear();render();
}

function flip(){flipped=!flipped;if(flipped)seen.add(deck[pos]);render();}
function prev(){if(pos>0){pos--;flipped=false;render();}}
function next(){if(pos<deck.length-1){pos++;flipped=false;render();}}
function goTo(i){pos=i;flipped=false;render();}

function render(){
  if(!deck.length){
    document.getElementById('app').innerHTML='<div style="display:flex;align-items:center;justify-content:center;flex:1;color:#888;font-size:15px">No cards match the selected categories</div>';
    return;
  }
  const card=CARDS[deck[pos]];
  const app=document.getElementById('app');

  let h='<div class="top"><h1>BUAN 587 Exam Prep</h1><div class="top-right"><span class="counter">'+(pos+1)+' / '+deck.length+'</span><button class="shuffle-btn" onclick="shuffle()" title="Shuffle">&#x21C4;</button></div></div>';

  // Category pills
  h+='<div class="cats">';
  CATS.forEach(cat=>{
    const on=activeCats.has(cat);
    const col=catColors[cat];
    h+='<button class="cat-pill'+(on?' on':'')+'" style="--cat-color:'+col+';--cat-bg:'+col+'15" onclick="toggleCat(\''+cat.replace(/'/g,"\\'")+'\')">'+cat+'</button>';
  });
  h+='</div>';

  // Progress
  h+='<div class="progress"><div class="progress-fill" style="width:'+((seen.size/deck.length)*100)+'%"></div></div>';

  // Card
  h+='<div class="card-wrap" onclick="flip()"><div class="card'+(flipped?' flipped':'')+'">';

  // Front
  h+='<div class="card-face card-front"><div class="card-cat" style="color:'+card.color+'">'+card.cat+'</div>';
  h+='<div class="card-q">'+card.q+'</div>';
  h+='<div class="card-hint">Tap to reveal key points</div></div>';

  // Back
  h+='<div class="card-face card-back"><div class="card-label">Key Points</div>';
  h+='<ul class="key-points">';
  card.pts.forEach(pt=>{
    h+='<li><span class="kp-bullet">\u25B8</span><span class="kp-text">'+pt+'</span></li>';
  });
  h+='</ul></div>';

  h+='</div></div>';

  // Nav
  h+='<div class="nav"><button class="nav-btn" onclick="prev()"'+(pos===0?' disabled':'')+'>\u2190 Prev</button><div class="nav-center">';
  deck.forEach((_,i)=>{
    const cls=i===pos?'active':(seen.has(deck[i])?'done':'');
    h+='<div class="dot '+cls+'" onclick="goTo('+i+')"></div>';
  });
  h+='</div><button class="nav-btn" onclick="next()"'+(pos>=deck.length-1?' disabled':'')+'>Next \u2192</button></div>';

  h+='<div class="kbd"><kbd>\u2190</kbd> <kbd>\u2192</kbd> navigate &nbsp; <kbd>space</kbd> flip &nbsp; <kbd>s</kbd> shuffle</div>';

  app.innerHTML=h;
}

function toggleCat(cat){
  if(activeCats.has(cat))activeCats.delete(cat);else activeCats.add(cat);
  filterDeck();
}

// Keyboard
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft')prev();
  else if(e.key==='ArrowRight')next();
  else if(e.key===' '){e.preventDefault();flip();}
  else if(e.key==='s'||e.key==='S')shuffle();
});

// Swipe support
let touchStartX=0;
document.addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX;});
document.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-touchStartX;
  if(Math.abs(dx)>50){if(dx>0)prev();else next();}
});

render();
</script>
</body>
</html>
